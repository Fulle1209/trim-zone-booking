<!DOCTYPE html>
<html lang="da">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trim Zone Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Playfair+Display:wght@700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .admin-page {
      min-height: 100vh;
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .admin-title h1 {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: 48px;
    }

    .admin-title p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .admin-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.04);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #f6e0a8, #d8b36a);
      color: #111827;
      border-color: transparent;
    }

    .admin-grid {
      display: grid;
      gap: 14px;
    }

    .admin-card {
      padding: 20px;
      display: grid;
      grid-template-columns: 1.2fr 1fr auto;
      gap: 18px;
      align-items: center;
    }

    .admin-left h3 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .admin-left p,
    .admin-middle p {
      margin: 6px 0;
      color: var(--muted);
    }

    .appointment-badge {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--gold-soft);
      border: 1px solid rgba(216, 179, 106, 0.28);
      color: #efd39b;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .danger-btn {
      background: #ff5c5c;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .empty-box {
      padding: 26px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .admin-page {
        padding: 18px;
      }

      .admin-title h1 {
        font-size: 34px;
      }

      .admin-card {
        grid-template-columns: 1fr;
      }

      .danger-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <main class="admin-page">
    <div class="admin-header">
      <div class="admin-title">
        <span class="badge">Trim Zone Admin</span>
        <h1>Bookingoversigt</h1>
        <p>Her kan din fætter se dagens og kommende bookinger samt aflyse dem.</p>
      </div>
    </div>

    <div class="admin-toolbar">
      <button class="filter-btn active" data-filter="all">Alle</button>
      <button class="filter-btn" data-filter="today">I dag</button>
      <button class="filter-btn" data-filter="upcoming">Kommende</button>
    </div>

    <div id="appointmentsList" class="admin-grid"></div>
  </main>

  <script src="/admin.js"></script>
</body>

</html>
